# Ejemplo de configuración Nginx para producción
# Ubicación: /etc/nginx/sites-available/chatbot-crm-widget
# 
# MEJORA SUGERIDA: Socket.IO con Connection condicional

server {
    server_name widgetchabot.hginet.com.co;

    # Proxy API — timeout extendido
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # Proxy Socket.IO - MEJORADO: Connection condicional
    location /socket.io/ {
        set $conn "close";
        if ($args ~ "transport=websocket") {
            set $conn "upgrade";
        }
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $conn;  # Condicional en lugar de fijo
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Health check - IMPORTANTE: El widget llama a /health para verificar conexión
    location = /health {
        proxy_pass http://localhost:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # También /api/health por si acaso
    location = /api/health {
        proxy_pass http://localhost:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend estático
    location / {
        proxy_pass http://localhost:8180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/widgetchabot.hginet.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/widgetchabot.hginet.com.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = widgetchabot.hginet.com.co) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name widgetchabot.hginet.com.co;
    return 404;
}
