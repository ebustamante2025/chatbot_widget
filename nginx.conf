server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # En Windows/Docker Desktop: host.docker.internal llega al host (puerto 3001 = backend).
    # Evita depender del DNS 127.0.0.11 si el contenedor no está en la red del compose.
    # Proxy API al backend
    location /api/ {
        rewrite ^/api/(.*)$ /api/$1 break;
        proxy_pass http://host.docker.internal:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Socket.IO
    location /socket.io/ {
        set $conn "close";
        if ($args ~ "transport=websocket") {
            set $conn "upgrade";
        }
        proxy_pass http://host.docker.internal:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $conn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Proxy health check (widget llama a /health o /api/health)
    location = /health {
        proxy_pass http://host.docker.internal:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /api/health {
        proxy_pass http://host.docker.internal:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Configuración para archivos estáticos (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache para assets estáticos (JS, CSS, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Permitir iframe desde cualquier origen (ajustar según necesidades de seguridad)
    add_header X-Frame-Options "ALLOWALL" always;

    # Configuración de CORS si es necesario
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Tamaño máximo de archivo
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
