# Widget Chatbot - Requiere que api-backend esté corriendo
# Se conecta a la red crm-chatbot-network (creada por chatbot_api_backend)
#
# Docker (producción o pruebas): copie .env.example → .env y ejecute:
#   docker compose up -d --build
#
# Localhost (Vite): copie .env.development.example → .env.development y:
#   npm run dev
#
# Plantillas: .env.example | .env.development.example

services:
  widget-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_ISA_REGISTRO_WEBHOOK_URL=${VITE_ISA_REGISTRO_WEBHOOK_URL}
        - VITE_ISA_AGENT_WEBHOOK_URL=${VITE_ISA_AGENT_WEBHOOK_URL}
    image: widget-chatbot:latest
    container_name: widget-chatbot-isa
    ports:
      - "${WIDGET_PORT:-8180}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - crm-chatbot-network
    restart: unless-stopped

networks:
  crm-chatbot-network:
    external: true
